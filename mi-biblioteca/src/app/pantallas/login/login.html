<div class="app-contenedor tarjeta-pantalla">
  <div class="header-navigation">
    <button class="btn-back" routerLink="/inicio">‹</button>
  </div>

  <div class="login-content">
    <div class="logo-container">
      <span class="book-icon">📖</span>
    </div>

    <h2>Iniciar sesión</h2>

    <form class="login-form" (ngSubmit)="iniciarSesion()">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input 
          type="email" 
          placeholder="Correo electrónico" 
          [(ngModel)]="correo"
          name="correo"
          required>
      </div>

      <div class="input-group">
        <span class="input-icon">🔒</span>
  
        <input 
          [type]="mostrarPassword ? 'text' : 'password'" 
          placeholder="Contraseña"
          [(ngModel)]="password"
          name="password"
          required>
  
        <button 
        type="button" 
        class="btn-eye" 
        (click)="togglePassword()">
        {{ mostrarPassword ? '🙈' : '👁️' }}
        </button>
      </div>

      <div class="form-options">
        <a routerLink="/recuperacion" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="boton-morado">Iniciar sesión</button>
    </form>

    <p class="register-redirect">
        ¿No tienes cuenta? <a routerLink="/registro">Regístrate</a>
    </p>
  </div>
</div>
