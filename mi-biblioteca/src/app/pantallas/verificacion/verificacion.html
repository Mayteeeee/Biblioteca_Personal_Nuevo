<div class="mobile-container tarjeta-pantalla">
  
  <div class="header-navigation">
    <button class="btn-back" routerLink="/login">‹</button>
  </div>

  <div class="verification-content">
    
    <div class="logo-container">
      <span class="book-icon">📖</span>
    </div>

    <h2>Ingresa el código de verificación</h2>
    
    <p class="subtitle-text">
      Hemos enviado un código de 6 dígitos a:<br>
      <strong class="user-email">{{ correo || 'tu correo' }}</strong>
    </p>

    <div class="lock-illustration">
      <div class="badge-circle">🔒</div>
    </div>

    <div class="code-inputs-container">
      <input
        *ngFor="let digito of codigo; let i = index; trackBy: trackByIndex"
        [id]="'codigo-' + i"
        type="text"
        maxlength="1"
        class="code-input"
        inputmode="numeric"
        autocomplete="one-time-code"
        (keydown)="manejarTecla($event, i)">
    </div>

    <button type="button" class="boton-morado" (click)="verificarCodigo()">
      Verificar código
    </button>

    <a class="link-action link-purple" (click)="reenviarCodigo()">
      {{ cargando ? 'Reenviando...' : 'Reenviar código' }}
    </a>

  </div>

  <div class="footer-navigation">
    <a (click)="irAlLogin()" class="link-action link-gray">
      Volver al inicio de sesión
    </a>
  </div>

</div>
