<div class="config-page">

  <h1 class="titulo-config">Configuración</h1>

  <div class="tabs-config">
    <button class="tab-config-btn" [class.activo]="pestanaActiva === 'perfil'" (click)="cambiarPestana('perfil')">
      Perfil
    </button>

    <button class="tab-config-btn" [class.activo]="pestanaActiva === 'preferencias'" (click)="cambiarPestana('preferencias')">
      Preferencias
    </button>

    <button class="tab-config-btn" [class.activo]="pestanaActiva === 'seguridad'" (click)="cambiarPestana('seguridad')">
      Seguridad
    </button>
  </div>

  <div class="config-card" *ngIf="pestanaActiva === 'perfil'">

    <div class="avatar-section">
      <div class="avatar-circle">
        <img *ngIf="foto" [src]="foto" alt="Foto de perfil">

        <svg *ngIf="!foto" viewBox="0 0 24 24" fill="none" stroke="#5d24b3" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>

      <label for="fotoPerfil" class="btn-foto">
        Cambiar foto
      </label>

      <input
        id="fotoPerfil"
        type="file"
        accept="image/*"
        style="display: none;"
        (change)="cambiarFoto($event)">
    </div>

    <div class="form-section">

      <div class="grupo-campo">
        <label>Nombre</label>

        <div class="input-editable">
          <input
            type="text"
            [(ngModel)]="usuario"
            name="usuario"
            [readonly]="!editandoUsuario"
            (input)="verificarCambios()">

          <button type="button" (click)="toggleUsuario()">
            {{ editandoUsuario ? '✔' : '✎' }}
          </button>
        </div>
      </div>

      <div class="grupo-campo">
        <label>Correo</label>

        <div class="input-editable">
          <input
            type="email"
            [(ngModel)]="correo"
            name="correo"
            [readonly]="!editandoCorreo"
            (input)="verificarCambios()">

          <button type="button" (click)="toggleCorreo()">
            {{ editandoCorreo ? '✔' : '✎' }}
          </button>
        </div>
      </div>

      <button
        type="button"
        class="btn-guardar"
        [disabled]="!cambiosPerfil"
        [class.deshabilitado]="!cambiosPerfil"
        (click)="guardarCambios()">
        Guardar cambios
      </button>

    </div>
  </div>

  <div class="config-card simple-card" *ngIf="pestanaActiva === 'preferencias'">
    <div class="grupo-campo ancho-completo">
      <label>Idioma de la aplicación</label>
      <input type="text" value="Español (México)" readonly>
    </div>
  </div>

  <div class="config-card simple-card" *ngIf="pestanaActiva === 'seguridad'">

    <div class="grupo-campo ancho-completo">
      <label>Contraseña actual</label>
      <input
        type="password"
        placeholder="Escribe tu contraseña actual"
        [(ngModel)]="passwordAnterior"
        name="passwordAnterior">
    </div>

    <div class="grupo-campo ancho-completo">
      <label>Nueva contraseña</label>
      <input
        type="password"
        placeholder="Escribe la nueva contraseña"
        [(ngModel)]="passwordNuevo"
        name="passwordNuevo">
    </div>

    <div class="grupo-campo ancho-completo">
      <label>Confirmar nueva contraseña</label>
      <input
        type="password"
        placeholder="Confirma la nueva contraseña"
        [(ngModel)]="confirmarPassword"
        name="confirmarPassword">
    </div>

    <button type="button" class="btn-guardar" (click)="cambiarPassword()">
      Cambiar contraseña
    </button>

  </div>

  <button type="button" class="btn-cerrar" (click)="cerrarSesion()">
    Cerrar sesión
  </button>

  <div class="nav-inferior">
    <div class="nav-item">
      <div class="nav-icono" routerLink="/panelprincipal">🏠</div>
      <span class="nav-texto">Inicio</span>
    </div>

    <div class="nav-item">
      <div class="nav-icono" routerLink="/mislibros">📚</div>
      <span class="nav-texto">Mis libros</span>
    </div>

    <div class="nav-item">
      <div class="nav-icono" routerLink="/prestamos">🔖</div>
      <span class="nav-texto">Préstamos</span>
    </div>

    <div class="nav-item active">
      <div class="nav-icono" routerLink="/configuracion">👤</div>
      <span class="nav-texto">Perfil</span>
    </div>
  </div>

</div>
