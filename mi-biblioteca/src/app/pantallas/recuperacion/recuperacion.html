<div class="tarjeta-pantalla">

  <div class="header-pantalla">
    <button class="btn-regresar" (click)="regresar()">‹</button>
    <h2>¿Olvidaste tu contraseña?</h2>
  </div>

  <div class="icono-central emoji-gigante">
    📖
  </div>

  <p class="descripcion">
    Ingresa tu correo electrónico y te enviaremos un código para restablecer tu contraseña.
  </p>


  <label for="correo">
    Correo electrónico
  </label>

  <div class="campo-icono">
    <input
      class="campo-texto"
      type="email"
      id="correo"
      placeholder="Correo electrónico"
      [(ngModel)]="correo"
    />
  </div>

  <button class="boton-morado" type="button" (click)="enviarCodigo()" [disabled]="cargando">
    {{ cargando ? 'Enviando...' : 'Enviar código' }}
  </button>

  <div class="ayuda-correo">
    <p>
      <span class="emoji-mediano">ℹ️</span> 
      Revisa tu carpeta de spam si no recibes el correo
    </p>
    <a (click)="regresar()" class="link-volver">Volver al inicio de sesión</a>
  </div>

</div>
